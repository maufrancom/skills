name: tao-train-mask-auto-encoder
network_arch: mae
automl_enabled: true
container_image: tao_toolkit.pyt
data_format: ssl
gpu_spec_key: train.num_gpus
actions:
  train:
    command: mae train -e {config_path}
    config_format: yaml
    inputs:
      dataset.train_data_sources:
        type: folder
      dataset.val_data_sources:
        type: folder
    outputs:
      results_dir:
        type: folder
    upload_excludes:
    - inputs/
  evaluate:
    command: mae evaluate -e {config_path}
    config_format: yaml
    inputs: {}
    outputs:
      results_dir:
        type: folder
    upload_excludes:
    - inputs/
  export:
    command: mae export -e {config_path}
    config_format: yaml
    inputs: {}
    outputs:
      results_dir:
        type: folder
    upload_excludes:
    - inputs/
  inference:
    command: mae inference -e {config_path}
    config_format: yaml
    inputs: {}
    outputs:
      results_dir:
        type: folder
    upload_excludes:
    - inputs/
  gen_trt_engine:
    command: mae gen_trt_engine -e {config_path}
    config_format: yaml
    inputs: {}
    outputs:
      results_dir:
        type: folder
    upload_excludes:
    - inputs/
data_sources: {}
spec_params: {}
key_defaults: {}
spec_shorthand_keys:
  num_epochs: train.num_epochs
  batch_size: dataset.batch_size
  learning_rate: train.optim.lr
description: MAE (Masked Autoencoder) for self-supervised pretraining and fine-tuning. Masks random patches and reconstructs
  them to learn visual representations. Supports pretrain and finetune stages.
