encryption_key: tlt_encode
results_dir: /results
dataset:
  num_classes: 4
  batch_size: -1
model:
  backbone: fan_small
  train_backbone: true
  pretrained_backbone_path: <required>
  return_interm_indices:
  - 1
  - 2
  - 3
  dec_layers: 6
  enc_layers: 1
  num_queries: 300
gen_trt_engine:
  gpu_id: 0
  onnx_file: /models/model.onnx
  trt_engine: /results/rtdetr.engine
  input_channel: 3
  input_width: 960
  input_height: 544
  tensorrt:
    data_type: FP16
    workspace_size: 1024
    min_batch_size: 1
    opt_batch_size: 10
    max_batch_size: 10
    calibration:
      cal_image_dir:
      - /data/calibration/images
      cal_cache_file: /results/rtdetr_calibration.cache
      cal_batch_size: 10
      cal_batches: 1000
