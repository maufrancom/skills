name: tao-train-rtdetr
network_arch: rtdetr
automl_enabled: true
container_image: tao_toolkit.pyt
data_format: coco
gpu_spec_key: train.num_gpus
actions:
  train:
    command: rtdetr train -e {config_path}
    config_format: yaml
    inputs:
      dataset.train_data_sources[0].image_dir:
        type: folder
      dataset.train_data_sources[0].json_file:
        type: file
      dataset.val_data_sources[0].image_dir:
        type: folder
      dataset.val_data_sources[0].json_file:
        type: file
    outputs:
      results_dir:
        type: folder
    upload_excludes:
    - inputs/
  distill:
    command: rtdetr distill -e {config_path}
    config_format: yaml
    inputs: {}
    outputs:
      results_dir:
        type: folder
    upload_excludes:
    - inputs/
  quantize:
    command: rtdetr quantize -e {config_path}
    config_format: yaml
    inputs: {}
    outputs:
      results_dir:
        type: folder
    upload_excludes:
    - inputs/
  evaluate:
    command: rtdetr evaluate -e {config_path}
    config_format: yaml
    inputs: {}
    outputs:
      results_dir:
        type: folder
    upload_excludes:
    - inputs/
  export:
    command: rtdetr export -e {config_path}
    config_format: yaml
    inputs: {}
    outputs:
      results_dir:
        type: folder
    upload_excludes:
    - inputs/
  inference:
    command: rtdetr inference -e {config_path}
    config_format: yaml
    inputs: {}
    outputs:
      results_dir:
        type: folder
    upload_excludes:
    - inputs/
  gen_trt_engine:
    command: rtdetr gen_trt_engine -e {config_path}
    config_format: yaml
    inputs: {}
    outputs:
      results_dir:
        type: folder
    upload_excludes:
    - inputs/
data_sources: {}
spec_params: {}
key_defaults: {}
spec_shorthand_keys:
  num_epochs: train.num_epochs
  batch_size: dataset.batch_size
  learning_rate: train.optim.lr
description: RT-DETR (Real-Time DEtection TRansformer) for 2D object detection. Designed for real-time inference with competitive
  accuracy. Supports distillation and quantization for deployment optimization.
