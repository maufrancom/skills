encryption_key: tlt_encode
results_dir: /results
dataset:
  infer_data_sources:
    image_dir:
    - /data/images
    classmap: /data/label_map.txt
  num_classes: 4
  batch_size: 8
  workers: 8
inference:
  trt_engine: /results/rtdetr.engine
  conf_threshold: 0.5
  input_width: 640
  input_height: 640
  color_map:
    person: green
model:
  backbone: fan_small
  num_feature_levels: 4
  dec_layers: 6
  enc_layers: 6
  num_queries: 900
  dropout_ratio: 0.0
  dim_feedforward: 2048
